version: '3.8'

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: miaota-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=miaota-token
      - INFLUXDB_ORG=miaota
      - INFLUXDB_BUCKET=industrial_data
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../config:/app/config
    depends_on:
      - influxdb
      - redis
    networks:
      - miaota-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: miaota-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - miaota-network

  # ==================== 时序数据库 ====================
  influxdb:
    image: influxdb:2.7
    container_name: miaota-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
      - DOCKER_INFLUXDB_INIT_ORG=miaota
      - DOCKER_INFLUXDB_INIT_BUCKET=industrial_data
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=miaota-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - miaota-network

  # ==================== 缓存服务 ====================
  redis:
    image: redis:7-alpine
    container_name: miaota-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - miaota-network

  # ==================== 向量数据库 ====================
  chromadb:
    image: chromadb/chroma:latest
    container_name: miaota-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - miaota-network

  # ==================== 监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: miaota-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - miaota-network

  grafana:
    image: grafana/grafana:latest
    container_name: miaota-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - miaota-network

# ==================== 网络 ====================
networks:
  miaota-network:
    driver: bridge

# ==================== 卷 ====================
volumes:
  influxdb-data:
  redis-data:
  chromadb-data:
  prometheus-data:
  grafana-data:
