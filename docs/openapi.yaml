openapi: 3.0.3
info:
  title: Miaota Industrial Agent API
  description: |
    工业智能监控与诊断系统API
    
    ## 功能模块
    - **数据采集**: PLC数据采集与管理
    - **设备管理**: 设备状态监控与配置
    - **告警管理**: 告警规则与通知
    - **数据分析**: 异常检测与趋势分析
    - **知识库**: 故障诊断与知识检索
    - **报表**: 数据导出与可视化
    
  version: v1.0.0-beta1
  contact:
    name: Miaota Team
    email: team@miaota.ai
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api/v1
    description: 本地开发环境
  - url: https://api.miaota.local/api/v1
    description: 生产环境

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: 健康检查
    description: 系统健康状态检查
  - name: 数据采集
    description: 数据采集相关接口
  - name: 设备管理
    description: 设备配置与状态
  - name: 告警
    description: 告警规则与通知
  - name: 数据分析
    description: 异常检测与分析
  - name: 知识库
    description: 故障诊断知识库
  - name: 报表
    description: 数据导出与报表

paths:
  # ============ 健康检查 ============
  /health:
    get:
      tags: [健康检查]
      summary: 系统健康检查
      description: 获取系统整体健康状态
      responses:
        '200':
          description: 系统健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2024-01-15T08:30:00Z"
                version: "v1.0.0-beta1"
                checks:
                  database:
                    status: healthy
                    response_time_ms: 12.3
                  plc:
                    status: healthy
                    response_time_ms: 45.2
        '503':
          description: 服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health/ready:
    get:
      tags: [健康检查]
      summary: 就绪检查
      description: Kubernetes就绪探针
      responses:
        '200':
          description: 服务就绪
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /health/live:
    get:
      tags: [健康检查]
      summary: 存活检查
      description: Kubernetes存活探针
      responses:
        '200':
          description: 服务存活
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  # ============ 数据采集 ============
  /collection/start:
    post:
      tags: [数据采集]
      summary: 启动数据采集
      description: 启动指定设备的数据采集
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionStartRequest'
      responses:
        '200':
          description: 启动成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 采集已在运行

  /collection/stop:
    post:
      tags: [数据采集]
      summary: 停止数据采集
      parameters:
        - name: device_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 停止成功

  /collection/status:
    get:
      tags: [数据采集]
      summary: 获取采集状态
      responses:
        '200':
          description: 采集状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_running:
                    type: boolean
                  device_count:
                    type: integer
                  last_data_time:
                    type: string
                    format: date-time
                  throughput:
                    type: number
                    description: 每秒数据点数

  /data/query:
    post:
      tags: [数据采集]
      summary: 查询历史数据
      description: 查询指定时间范围的历史数据
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataQueryRequest'
      responses:
        '200':
          description: 查询结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataQueryResponse'

  /data/latest:
    get:
      tags: [数据采集]
      summary: 获取最新数据
      parameters:
        - name: tags
          in: query
          description: 要查询的点位标签
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: 最新数据

  # ============ 设备管理 ============
  /devices:
    get:
      tags: [设备管理]
      summary: 获取设备列表
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [s7, modbus]
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, error]
      responses:
        '200':
          description: 设备列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

    post:
      tags: [设备管理]
      summary: 创建设备
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
      responses:
        '201':
          description: 创建成功

  /devices/{device_id}:
    get:
      tags: [设备管理]
      summary: 获取设备详情
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 设备详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [设备管理]
      summary: 更新设备
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateRequest'
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [设备管理]
      summary: 删除设备
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功

  /devices/{device_id}/tags:
    get:
      tags: [设备管理]
      summary: 获取设备点位
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 点位列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceTag'

  # ============ 告警 ============
  /alerts:
    get:
      tags: [告警]
      summary: 获取告警列表
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info]
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: 告警列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  /alerts/{alert_id}/acknowledge:
    post:
      tags: [告警]
      summary: 确认告警
      parameters:
        - name: alert_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: 确认成功

  /alerts/{alert_id}/resolve:
    post:
      tags: [告警]
      summary: 解决告警
      parameters:
        - name: alert_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 解决成功

  /rules:
    get:
      tags: [告警]
      summary: 获取告警规则
      responses:
        '200':
          description: 规则列表

    post:
      tags: [告警]
      summary: 创建告警规则
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRule'
      responses:
        '201':
          description: 创建成功

  # ============ 数据分析 ============
  /analysis/anomaly:
    post:
      tags: [数据分析]
      summary: 异常检测分析
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyAnalysisRequest'
      responses:
        '200':
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyAnalysisResponse'

  /analysis/trend:
    get:
      tags: [数据分析]
      summary: 趋势分析
      parameters:
        - name: tag
          in: query
          required: true
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 趋势数据

  /analysis/forecast:
    post:
      tags: [数据分析]
      summary: 预测分析
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:
                  type: string
                horizon:
                  type: integer
                  description: 预测步数
                  default: 24
      responses:
        '200':
          description: 预测结果

  # ============ 知识库 ============
  /knowledge/search:
    post:
      tags: [知识库]
      summary: 搜索知识库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                limit:
                  type: integer
                  default: 5
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeDoc'

  /knowledge/diagnose:
    post:
      tags: [知识库]
      summary: 智能诊断
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnoseRequest'
      responses:
        '200':
          description: 诊断结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnoseResponse'

  # ============ 报表 ============
  /reports/daily:
    get:
      tags: [报表]
      summary: 生成日报
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 日报数据

  /reports/export:
    post:
      tags: [报表]
      summary: 导出数据
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: 导出文件
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url:
                    type: string
            text/csv:
              schema:
                type: string
                format: binary

# ============ 组件定义 ============
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT认证令牌
    
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证

  schemas:
    # 基础类型
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              response_time_ms:
                type: number
              message:
                type: string

    # 设备相关
    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [s7, modbus]
        host:
          type: string
        port:
          type: integer
        status:
          type: string
          enum: [online, offline, error]
        last_seen:
          type: string
          format: date-time
        tag_count:
          type: integer

    DeviceTag:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        data_type:
          type: string
        unit:
          type: string
        description:
          type: string

    DeviceCreateRequest:
      type: object
      required: [name, type, host, port]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [s7, modbus]
        host:
          type: string
        port:
          type: integer
        rack:
          type: integer
        slot:
          type: integer
        tags:
          type: array
          items:
            $ref: '#/components/schemas/DeviceTag'

    DeviceUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/DeviceCreateRequest'

    # 告警相关
    Alert:
      type: object
      properties:
        id:
          type: string
        rule_id:
          type: string
        rule_name:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        message:
          type: string
        device_id:
          type: string
        tag:
          type: string
        value:
          type: number
        threshold:
          type: number
        status:
          type: string
          enum: [active, acknowledged, resolved]
        created_at:
          type: string
          format: date-time
        acknowledged_by:
          type: string
        acknowledged_at:
          type: string
          format: date-time

    AlertRule:
      type: object
      properties:
        rule_id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        condition:
          type: object
          properties:
            type:
              type: string
            tag:
              type: string
            operator:
              type: string
            value:
              type: number
        severity:
          type: string
        message:
          type: string
        suppression_window_minutes:
          type: integer

    # 数据相关
    DataPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
        quality:
          type: string
          enum: [good, bad, uncertain]

    DataQueryRequest:
      type: object
      required: [tags, start_time, end_time]
      properties:
        tags:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        aggregation:
          type: string
          enum: [raw, mean, sum, min, max]
          default: raw
        interval:
          type: string
          description: 聚合间隔（如 1m, 5m, 1h）

    DataQueryResponse:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/DataPoint'

    CollectionStartRequest:
      type: object
      properties:
        device_ids:
          type: array
          items:
            type: string
        scan_interval:
          type: integer
          default: 10

    # 分析相关
    AnomalyAnalysisRequest:
      type: object
      properties:
        tag:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        sensitivity:
          type: number
          default: 0.95

    AnomalyAnalysisResponse:
      type: object
      properties:
        anomalies:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              value:
                type: number
              expected:
                type: number
              score:
                type: number
        total_points:
          type: integer
        anomaly_count:
          type: integer
        anomaly_rate:
          type: number

    # 知识库相关
    KnowledgeDoc:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        similarity_score:
          type: number

    DiagnoseRequest:
      type: object
      required: [symptoms]
      properties:
        symptoms:
          type: string
          description: 症状描述
        device_id:
          type: string
        tags:
          type: object
          additionalProperties:
            type: number

    DiagnoseResponse:
      type: object
      properties:
        diagnosis_id:
          type: string
        root_cause:
          type: string
        confidence:
          type: number
        suggestions:
          type: array
          items:
            type: string
        spare_parts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: integer
        references:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeDoc'

    # 报表相关
    ExportRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        format:
          type: string
          enum: [csv, json, excel]
          default: csv

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
