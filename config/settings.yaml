# 系统配置

# ==================== 项目基础配置 ====================
project:
  name: "Miaota Industrial Agent"
  version: "0.1.0"
  environment: "development"  # development / production

# ==================== PLC 数据采集配置 ====================
plc:
  # 西门子 S7 配置
  s7:
    enabled: true
    host: "192.168.1.100"      # PLC IP 地址
    port: 102                   # S7 端口
    rack: 0                     # 机架号
    slot: 1                     # 插槽号 (S7-1200/1500 通常为 1)
  
  # Modbus TCP 配置 (可选)
  modbus:
    enabled: false
    host: "192.168.1.101"
    port: 502
  
  # 采集频率 (秒)
  scan_interval: 10
  
  # 数据质量检查
  quality_check:
    enabled: true
    timeout_ms: 5000           # 超时时间
    retry_count: 3             # 重试次数

# ==================== 数据库配置 ====================
database:
  # 时序数据库 (主存储)
  influxdb:
    enabled: true
    host: "localhost"
    port: 8086
    bucket: "industrial_data"
    org: "miaota"
    token: "your-influxdb-token"  # 从环境变量读取更安全
  
  # 关系型数据库 (配置与元数据)
  sqlite:
    enabled: true
    path: "data/metadata.db"
  
  # MySQL (生产环境可选)
  mysql:
    enabled: false
    host: "localhost"
    port: 3306
    database: "miaota_industrial"
    user: "root"
    password: "${MYSQL_PASSWORD}"  # 从环境变量读取

# ==================== 点位映射配置 ====================
tag_mapping:
  file: "config/tag_mapping.xlsx"
  auto_reload: true          # 自动重新加载 (文件变化时)
  cache_enabled: true        # 启用缓存

# ==================== 规则引擎配置 ====================
rules:
  config_file: "config/rules.json"
  evaluation_interval: 10    # 规则评估间隔 (秒)
  
  # 规则执行策略
  strategy:
    parallel: true           # 并行执行规则
    max_workers: 4           # 最大工作线程数
    timeout_seconds: 30      # 单条规则超时时间
  
  # 告警配置
  alert:
    enabled: true
    channels:
      - type: "log"          # 日志记录
      - type: "file"         # 写入文件
      # - type: "feishu"     # 飞书通知 (需配置 webhook)
      # - type: "email"      # 邮件通知
      # - type: "sms"        # 短信通知
    
    # 告警抑制 (防止告警风暴)
    suppression:
      enabled: true
      window_minutes: 15     # 相同告警 15 分钟内只发一次

# ==================== 异常检测模型配置 ====================
anomaly_detection:
  # 默认算法
  default_method: "isolation_forest"
  
  # Isolation Forest 参数
  isolation_forest:
    contamination: 0.05      # 预期异常比例
    n_estimators: 100        # 树的数量
    random_state: 42
  
  # LSTM Autoencoder 参数 (可选)
  lstm_ae:
    enabled: false
    sequence_length: 100     # 序列长度
    latent_dim: 32           # 潜在空间维度
    epochs: 50
    batch_size: 32
  
  # 模型更新策略
  retraining:
    enabled: true
    trigger: "weekly"        # weekly / monthly / data_volume
    data_threshold: 10000    # 数据量达到阈值时触发

# ==================== 时序预测配置 ====================
forecasting:
  enabled: true
  model: "neuralprophet"     # neuralprophet / prophet
  
  # NeuralProphet 参数
  neuralprophet:
    n_forecasts: 4           # 预测未来 4 个时间点
    n_lags: 24               # 使用过去 24 个时间点
    daily_seasonality: true
    yearly_seasonality: false
  
  # 预测评估
  evaluation:
    metrics: ["mae", "rmse", "mape"]
    threshold_mape: 20       # MAPE 超过 20% 时告警

# ==================== LLM 与 RAG 配置 ====================
llm:
  # LLM 服务配置
  provider: "ollama"         # ollama / transformers / openai_api
  
  # Ollama 配置 (推荐本地部署)
  ollama:
    host: "http://localhost:11434"
    model: "qwen2.5:3b"      # 轻量级中文模型
  
  # Transformers 配置 (本地加载)
  transformers:
    model_name: "Qwen/Qwen2.5-3B-Instruct"
    device: "cuda"           # cuda / cpu
    load_in_4bit: true       # 4bit 量化，节省显存
  
  # 生成参数
  generation:
    max_tokens: 512
    temperature: 0.7
    top_p: 0.9

# RAG 配置
rag:
  enabled: true
  knowledge_dir: "data/knowledge_base"
  vector_store: "chroma"     # chroma / faiss / milvus
  
  # ChromaDB 配置
  chroma:
    persist_directory: "data/vector_db"
  
  # Embedding 模型
  embedding:
    model: "shibing624/text2vec-base-chinese"
    device: "cpu"
  
  # 检索配置
  retrieval:
    k: 3                     # 返回 Top-K 个相关文档
    score_threshold: 0.5     # 相似度阈值
  
  # 文档分块
  chunking:
    chunk_size: 500
    chunk_overlap: 50

# ==================== 日志配置 ====================
logging:
  level: "INFO"              # DEBUG / INFO / WARNING / ERROR
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module} | {message}"
  
  # 控制台输出
  console:
    enabled: true
    colorize: true
  
  # 文件输出
  file:
    enabled: true
    path: "logs/app.log"
    rotation: "10 MB"        # 日志轮转
    retention: "30 days"     # 保留 30 天
  
  # 错误日志单独记录
  error_file:
    enabled: true
    path: "logs/error.log"

# ==================== API 服务配置 ====================
api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  
  # CORS 配置
  cors:
    enabled: true
    origins: ["*"]
  
  # 认证 (生产环境建议开启)
  auth:
    enabled: false
    type: "api_key"          # api_key / jwt
    api_key: "${API_KEY}"    # 从环境变量读取

# ==================== 监控大屏配置 ====================
dashboard:
  enabled: true
  platform: "streamlit"      # streamlit / custom
  port: 8501
  
  # 刷新频率 (秒)
  refresh_interval: 10
  
  # 显示配置
  display:
    show_realtime: true
    show_forecast: true
    show_anomalies: true
    show_diagnosis: true

# ==================== 自进化配置 ====================
self_evolution:
  enabled: true
  
  # 反馈收集
  feedback:
    enabled: true
    storage: "data/feedback.db"
  
  # 自动微调触发条件
  autotrain:
    enabled: false           # 初期建议手动触发
    min_samples: 500         # 最少样本数
    schedule: "0 2 * * 0"    # 每周日凌晨 2 点 (cron 表达式)
  
  # 模型版本管理
  versioning:
    enabled: true
    save_best: true          # 保存最优模型
    max_versions: 5          # 最多保留 5 个版本

# ==================== 安全配置 ====================
security:
  # 控制指令安全限制
  control_limits:
    enabled: true
    max_change_percent: 10   # 单次调节不超过 10%
    require_confirmation: true  # 关键操作需确认
  
  # 急停保护
  emergency_stop:
    enabled: true
    triggers:
      - "critical_alarm"
      - "communication_loss"
      - "manual_button"
